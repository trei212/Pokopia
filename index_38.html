    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            color: #3a3a3a;
            overflow-x: hidden;
            position: relative;
        }
        .bg-blob {
            position: fixed; pointer-events: none; z-index: 0;
            width: 500px; height: 500px; border-radius: 50%;
            filter: blur(120px); opacity: 0.5;
            animation: blobFloat 20s ease-in-out infinite;
        }
        .blob-green  { top: -100px; left: -100px; background: #a8e6cf; animation-delay: 0s; }
        .blob-peach  { bottom: 20%; right: -150px; background: #ffd3b6; animation-delay: 4s; }
        .blob-blue   { top: 40%; left: 30%; background: #a8d8ea; animation-delay: 8s; }
        .blob-pink   { bottom: -50px; left: 20%; background: #ffaaa5; animation-delay: 12s; }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative; z-index: 1;
        }
        /* ---- GLASSMORPHISM ---- */
        .glass {
            background: rgba(255,255,255,0.72);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 32px rgba(31,38,135,0.06);
            border-radius: 16px;
        }
        header {
            text-align: center;
            padding: 30px 0 10px;
        }
        .header-logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(90deg, #4ecdc4, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            letter-spacing: 4px;
            line-height: 1.1;
        }
        .header-sub {
            font-size: 18px;
            color: #7a6b8a;
            margin-top: 6px;
            font-weight: 400;
        }
        .header-desc {
            font-size: 14px;
            color: #9b8fa8;
            margin-top: 4px;
            font-weight: 500;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        .stat-box {
            padding: 18px 32px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 2.2em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .stat-box .label {
            color: #7a6b8a;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 2px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 22px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.72);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            color: #3a3a3a;
            font-size: 1em;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(31,38,135,0.06);
        }
        .search-box input:focus {
            border-color: #9b6fd4;
            box-shadow: 0 4px 16px rgba(155,111,212,0.12);
        }
        .search-box input::placeholder {
            color: #9b8fa8;
        }
        .category-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 8px 18px;
            border-radius: 24px;
            border: 1px solid rgba(155,111,212,0.2);
            background: rgba(255,255,255,0.6);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            color: #7a6b8a;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
        }
        .category-btn:hover {
            background: rgba(155,111,212,0.1);
            border-color: rgba(155,111,212,0.4);
            color: #9b6fd4;
            transform: translateY(-1px);
        }
        .category-btn.active {
            background: linear-gradient(135deg, #9b6fd4, #e87aab);
            color: #fff;
            border-color: transparent;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(155,111,212,0.3);
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .item-card {
            background: rgba(255,255,255,0.72);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 32px rgba(31,38,135,0.06);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .item-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(155,111,212,0.12);
            border-color: rgba(155,111,212,0.2);
        }
        .item-card.collected {
            border-color: #9b6fd4;
            background: rgba(155,111,212,0.08);
            box-shadow: 0 4px 16px rgba(155,111,212,0.12);
        }
        .item-card.collected::after {
            content: '\2713';
            position: absolute;
            top: 6px;
            right: 6px;
            background: linear-gradient(135deg, #9b6fd4, #e87aab);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.75em;
            box-shadow: 0 2px 8px rgba(155,111,212,0.3);
        }
        .item-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.08));
            transition: transform 0.3s;
        }
        .item-card:hover img {
            transform: scale(1.08);
        }
        .item-card.collected img {
            opacity: 0.7;
        }
        .item-number {
            font-size: 0.72em;
            color: #9b8fa8;
            margin-bottom: 3px;
            font-weight: 600;
        }
        .item-name {
            font-size: 0.85em;
            color: #3a3a3a;
            font-weight: 700;
            word-break: break-word;
            line-height: 1.2;
        }
        .item-category {
            font-size: 0.68em;
            color: #9b8fa8;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }
        .no-results {
            text-align: center;
            padding: 60px;
            color: #9b8fa8;
            font-size: 1.2em;
            grid-column: 1 / -1;
            font-weight: 600;
        }
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9b6fd4, #e87aab);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(155,111,212,0.35);
            transition: all 0.3s;
            z-index: 100;
        }
        .scroll-top:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(155,111,212,0.45);
        }
        .scroll-top.visible {
            display: flex;
        }
        @media (max-width: 768px) {
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
            .header-logo { font-size: 36px; }
            .stat-box { padding: 14px 20px; }
        }
    </style>
</head>

        // State
        let collected = new Set();
        let currentCategory = 'all';
        let searchQuery = '';

        // DOM elements
        const grid = document.getElementById('items-grid');
        const searchInput = document.getElementById('search-input');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const scrollTopBtn = document.getElementById('scroll-top');
        const totalCollectedEl = document.getElementById('total-collected');
        const percentCompleteEl = document.getElementById('percent-complete');

        // Load collected items from localStorage
        function loadProgress() {
            try {
                const saved = localStorage.getItem('pokopia-collected');
                if (saved) {
                    collected = new Set(JSON.parse(saved));
                }
            } catch (e) {
                console.error('Error loading progress:', e);
            }
        }

        // Save collected items to localStorage
        function saveProgress() {
            try {
                localStorage.setItem('pokopia-collected', JSON.stringify([...collected]));
            } catch (e) {
                console.error('Error saving progress:', e);
            }
        }

        // Update stats
        function updateStats() {
            totalCollectedEl.textContent = collected.size;
            percentCompleteEl.textContent = Math.round((collected.size / items.length) * 100) + '%';
        }

        // Render items
        function renderItems() {
            grid.innerHTML = '';

            const filtered = items.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = !searchQuery || 
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.num.toString().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No items found</div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card' + (collected.has(item.num) ? ' collected' : '');
                card.dataset.num = item.num;

                const img = document.createElement('img');
                img.src = `https://pokopiamap.com/images/items/${encodeURIComponent(item.url_name)}.webp`;
                img.alt = item.name;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.style.display = 'none';
                };

                const numEl = document.createElement('div');
                numEl.className = 'item-number';
                numEl.textContent = '#' + String(item.num).padStart(4, '0');

                const nameEl = document.createElement('div');
                nameEl.className = 'item-name';
                nameEl.textContent = item.name;

                const catEl = document.createElement('div');
                catEl.className = 'item-category';
                catEl.textContent = item.category;

                card.appendChild(img);
                card.appendChild(numEl);
                card.appendChild(nameEl);
                card.appendChild(catEl);

                card.addEventListener('click', () => {
                    if (collected.has(item.num)) {
                        collected.delete(item.num);
                        card.classList.remove('collected');
                    } else {
                        collected.add(item.num);
                        card.classList.add('collected');
                    }
                    saveProgress();
                    updateStats();
                });

                grid.appendChild(card);
            });
        }

        // Event listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderItems();
        });

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderItems();
            });
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.addEventListener('scroll', () => {
            scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
        });

        // Initialize
        loadProgress();
        updateStats();
        renderItems();
    </script>
